name: Release Toolchain

on:
  workflow_dispatch:
    inputs:
      kind:
        description: "Which toolchain to release"
        required: true
        default: llvm
        type: choice
        options:
          - llvm
          - ai-analysis
      toolchain_version:
        description: "Fidan toolchain package version (defaults to workspace version)"
        required: false
        type: string
      publish:
        description: "Upload artifacts and manifest to R2"
        required: true
        default: false
        type: boolean
      llvm_tool_version:
        description: "Upstream LLVM version for the LLVM toolchain package"
        required: false
        default: "21.1.8"
        type: string
      ai_analysis_tool_version:
        description: "AI analysis helper tool version (defaults to workspace version)"
        required: false
        default: ""
        type: string

jobs:
  build-llvm-toolchain:
    name: Build LLVM toolchains
    if: ${{ inputs.kind == 'llvm' }}
    uses: ./.github/workflows/llvm-toolchain-build.yaml
    with:
      toolchain_version: ${{ inputs.toolchain_version }}
      llvm_tool_version: ${{ inputs.llvm_tool_version }}
      validate: false

  release-llvm:
    name: Release LLVM toolchain
    if: ${{ inputs.kind == 'llvm' }}
    needs: build-llvm-toolchain
    uses: ./.github/workflows/toolchain-bundle-publish.yaml
    with:
      artifact_pattern: llvm-toolchain-*
      bundle_artifact_name: toolchain-distribution-bundle-llvm
      publish: ${{ inputs.publish }}
    secrets: inherit

  build-ai-analysis-toolchain:
    name: Build AI analysis toolchains
    if: ${{ inputs.kind == 'ai-analysis' }}
    uses: ./.github/workflows/ai-analysis-toolchain-build.yaml
    with:
      toolchain_version: ${{ inputs.toolchain_version }}
      tool_version: ${{ inputs.ai_analysis_tool_version }}
      validate: false

  release-ai-analysis:
    name: Release AI analysis toolchain
    if: ${{ inputs.kind == 'ai-analysis' }}
    needs: build-ai-analysis-toolchain
    uses: ./.github/workflows/toolchain-bundle-publish.yaml
    with:
      artifact_pattern: ai-analysis-toolchain-*
      bundle_artifact_name: toolchain-distribution-bundle-ai-analysis
      publish: ${{ inputs.publish }}
    secrets: inherit
