name: Release Toolchain

on:
  workflow_dispatch:
    inputs:
      toolchain_version:
        description: "Fidan toolchain package version (defaults to workspace version)"
        required: false
        type: string
      publish:
        description: "Upload artifacts and manifest to R2"
        required: true
        default: false
        type: boolean
      llvm_tool_version:
        description: "Upstream LLVM version for the toolchain package"
        required: true
        default: "22.1.1"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-llvm-toolchain:
    name: Build LLVM toolchain (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_name: llvm-toolchain-windows
            source_key: windows
          - name: Linux
            os: ubuntu-latest
            artifact_name: llvm-toolchain-linux
            source_key: linux
          - name: macOS
            os: macos-latest
            artifact_name: llvm-toolchain-macos
            source_key: macos

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve LLVM source metadata
        id: source
        shell: pwsh
        run: |
          $sources = Get-Content "config/llvm-toolchain-sources.json" -Raw | ConvertFrom-Json -AsHashtable
          $version = "${{ inputs.llvm_tool_version }}"
          $platform = "${{ matrix.source_key }}"
          if (-not $sources.ContainsKey($version)) {
            throw "Unsupported LLVM version '$version' in config/llvm-toolchain-sources.json"
          }
          $versionInfo = $sources[$version]
          if (-not $versionInfo.ContainsKey($platform)) {
            throw "Unsupported LLVM platform '$platform' for version '$version' in config/llvm-toolchain-sources.json"
          }
          $platformInfo = $versionInfo[$platform]
          "archive_url=$($platformInfo.url)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "archive_sha256=$($platformInfo.sha256)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Package LLVM toolchain artifact
        shell: pwsh
        run: |
          ./scripts/package-toolchain.ps1 `
            -Kind "llvm" `
            -ToolchainVersion "${{ inputs.toolchain_version }}" `
            -ToolVersion "${{ inputs.llvm_tool_version }}" `
            -UpstreamArchiveUrl "${{ steps.source.outputs.archive_url }}" `
            -UpstreamArchiveSha256 "${{ steps.source.outputs.archive_sha256 }}"

      - name: Upload LLVM toolchain artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/release

  bundle:
    name: Merge manifest
    runs-on: ubuntu-latest
    needs: build-llvm-toolchain
    environment: releases
    if: ${{ needs.build-llvm-toolchain.result == 'success' }}

    steps:
      - uses: actions/checkout@v6

      - name: Download LLVM toolchain artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: llvm-toolchain-*
          path: dist/release
          merge-multiple: true

      - name: Fetch existing manifest if present
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          if aws s3api head-object \
            --bucket "$R2_BUCKET" \
            --key "manifest.json" \
            --endpoint-url "$R2_ENDPOINT" >/dev/null 2>&1; then
            if aws s3 cp "s3://$R2_BUCKET/manifest.json" dist/release/existing-manifest.json \
              --endpoint-url "$R2_ENDPOINT" \
              --no-progress; then
              echo "Fetched existing manifest from R2"
            else
              echo "Remote manifest exists but could not be fetched from R2" >&2
              exit 1
            fi
          else
            status_code="$(curl -sS -o /dev/null -w "%{http_code}" "https://releases.fidan.dev/manifest.json" || true)"
            if [ "$status_code" = "404" ]; then
              echo "No existing manifest present yet"
            elif [ -z "$status_code" ] || [ "$status_code" = "000" ]; then
              echo "Failed to probe existing manifest state" >&2
              exit 1
            else
              echo "Remote manifest appears to exist but could not be read from R2" >&2
              exit 1
            fi
          fi

      - name: Merge distribution manifest
        shell: pwsh
        run: |
          if (Test-Path "dist/release/existing-manifest.json") {
            ./scripts/merge-distribution-manifest.ps1 `
              -FragmentsRoot "dist/release/fragments" `
              -ExistingManifestPath "dist/release/existing-manifest.json" `
              -OutputPath "dist/release/manifest.json"
          } else {
            ./scripts/merge-distribution-manifest.ps1 `
              -FragmentsRoot "dist/release/fragments" `
              -OutputPath "dist/release/manifest.json"
          }

      - name: Upload merged distribution bundle
        uses: actions/upload-artifact@v7
        with:
          name: toolchain-distribution-bundle
          path: dist/release

  publish:
    name: Publish to R2
    runs-on: ubuntu-latest
    needs: bundle
    if: ${{ inputs.publish }}
    environment: releases

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: toolchain-distribution-bundle
          path: dist/release

      - name: Upload payload to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 sync dist/release/payload "s3://$R2_BUCKET/" \
            --endpoint-url "$R2_ENDPOINT" \
            --no-progress

      - name: Upload manifest to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 cp dist/release/manifest.json "s3://$R2_BUCKET/manifest.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "no-cache"
