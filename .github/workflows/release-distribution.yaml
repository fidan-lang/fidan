name: Release Distribution

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to package (defaults to workspace version)"
        required: false
        type: string
      publish:
        description: "Upload artifacts and manifest to R2"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Package release artifact
        shell: pwsh
        run: |
          $version = ""
          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}"
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
          } else {
            $version = "${{ inputs.version }}"
          }
          if ($version) {
            ./scripts/package-release.ps1 -Version $version
          } else {
            ./scripts/package-release.ps1
          }

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}
          path: dist/release

  bundle:
    name: Merge manifest
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}

    steps:
      - uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist/release
          merge-multiple: true

      - name: Fetch existing manifest if present
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          manifest_url="https://releases.fidan.dev/manifest.json"
          status_code="$(curl -sS -o /dev/null -w "%{http_code}" "$manifest_url" || true)"
          if [ "$status_code" = "404" ]; then
            echo "No existing manifest present yet"
          else
            if [ -z "$status_code" ] || [ "$status_code" = "000" ]; then
              echo "Failed to probe existing manifest at $manifest_url" >&2
              exit 1
            fi
            if ! curl -fsSL "$manifest_url" -o dist/release/existing-manifest.json; then
              echo "Remote manifest exists but could not be fetched from $manifest_url" >&2
              exit 1
            fi
            echo "Fetched existing manifest"
          fi

      - name: Merge distribution manifest
        shell: pwsh
        run: |
          if (Test-Path "dist/release/existing-manifest.json") {
            ./scripts/merge-distribution-manifest.ps1 `
              -FragmentsRoot "dist/release/fragments" `
              -ExistingManifestPath "dist/release/existing-manifest.json" `
              -OutputPath "dist/release/manifest.json"
          } else {
            ./scripts/merge-distribution-manifest.ps1 `
              -FragmentsRoot "dist/release/fragments" `
              -OutputPath "dist/release/manifest.json"
          }

      - name: Upload merged distribution bundle
        uses: actions/upload-artifact@v7
        with:
          name: distribution-bundle
          path: dist/release

  publish:
    name: Publish to R2
    runs-on: ubuntu-latest
    needs: bundle
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: releases

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: distribution-bundle
          path: dist/release

      - name: Upload payload to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 sync dist/release/payload "s3://$R2_BUCKET/" \
            --endpoint-url "$R2_ENDPOINT" \
            --no-progress

      - name: Upload manifest to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 cp dist/release/manifest.json "s3://$R2_BUCKET/manifest.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "no-cache"

      - name: Publish GitHub release assets
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/payload/fidan/**/*.tar.gz
          generate_release_notes: true
          make_latest: true
          append_body: true
          body: |
            ## Installation

            Bootstrap installers:
            - Windows PowerShell: `./scripts/bootstrap.ps1`
            - POSIX shell: `./scripts/bootstrap.sh`

            Direct downloads:
            - Release tarballs are attached to this GitHub Release.
            - The machine-readable manifest is published at `https://releases.fidan.dev/manifest.json`.

            ## Notes

            - The `fidan` binaries published here are self-managed installs.
            - Optional toolchains such as LLVM are distributed separately via `releases.fidan.dev`.
            - By installing Fidan or any separately distributed toolchain component, you agree to the license and terms of the respective component.
