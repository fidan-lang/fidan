name: Release Distribution

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to package (defaults to workspace version)"
        required: false
        type: string
      publish:
        description: "Upload artifacts and manifest to R2"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    environment: releases
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Package release artifact
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          $version = ""
          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}"
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
          } else {
            $version = "${{ inputs.version }}"
          }
          if ($version) {
            ./scripts/package-release.ps1 -Version $version
          } else {
            ./scripts/package-release.ps1
          }

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}
          path: dist/release

  bundle:
    name: Merge manifest
    runs-on: ubuntu-latest
    needs: build
    environment: releases
    if: ${{ needs.build.result == 'success' }}

    steps:
      - uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist/release
          merge-multiple: true

      - name: Fetch existing manifest if present
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          if aws s3api head-object \
            --bucket "$R2_BUCKET" \
            --key "manifest.json" \
            --endpoint-url "$R2_ENDPOINT" >/dev/null 2>&1; then
            if aws s3 cp "s3://$R2_BUCKET/manifest.json" dist/release/existing-manifest.json \
              --endpoint-url "$R2_ENDPOINT" \
              --no-progress; then
              echo "Fetched existing manifest from R2"
            else
              echo "Remote manifest exists but could not be fetched from R2" >&2
              exit 1
            fi
          else
            status_code="$(curl -sS -o /dev/null -w "%{http_code}" "https://releases.fidan.dev/manifest.json" || true)"
            if [ "$status_code" = "404" ]; then
              echo "No existing manifest present yet"
            elif [ -z "$status_code" ] || [ "$status_code" = "000" ]; then
              echo "Failed to probe existing manifest state" >&2
              exit 1
            else
              echo "Remote manifest appears to exist but could not be read from R2" >&2
              exit 1
            fi
          fi

      - name: Merge distribution manifest
        shell: pwsh
        run: |
          if (Test-Path "dist/release/existing-manifest.json") {
            ./scripts/merge-distribution-manifest.ps1 `
              -FragmentsRoot "dist/release/fragments" `
              -ExistingManifestPath "dist/release/existing-manifest.json" `
              -OutputPath "dist/release/manifest.json"
          } else {
            ./scripts/merge-distribution-manifest.ps1 `
              -FragmentsRoot "dist/release/fragments" `
              -OutputPath "dist/release/manifest.json"
          }

      - name: Upload merged distribution bundle
        uses: actions/upload-artifact@v7
        with:
          name: distribution-bundle
          path: dist/release

  publish:
    name: Publish to R2
    runs-on: ubuntu-latest
    needs: bundle
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: releases

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: distribution-bundle
          path: dist/release

      - name: Upload payload to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 sync dist/release/payload "s3://$R2_BUCKET/" \
            --endpoint-url "$R2_ENDPOINT" \
            --checksum-algorithm SHA256 \
            --cache-control "no-cache" \
            --no-progress

      - name: Upload manifest to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 cp dist/release/manifest.json "s3://$R2_BUCKET/manifest.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "no-cache"

      - name: Publish GitHub release assets
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/payload/fidan/**/*.tar.gz
            dist/release/payload/fidan/**/*.exe
          generate_release_notes: true
          make_latest: true
          append_body: true
          body: |
            ## Installation

            Bootstrap installers:
            - Windows installer: download `fidan_windows_bootstrap_${{ github.ref_name }}.exe` from this Release and run it.
            - WinGet: install via `winget install --id=Fidan.Fidan --source=winget`
            - Windows PowerShell: `iwr https://fidan.dev/install.ps1 -UseBasicParsing | iex`
            - POSIX shell: `curl -fsSL https://fidan.dev/install.sh | sh`

            Direct downloads:
            - Release tarballs are attached to this GitHub Release.
            - The machine-readable manifest is published at `https://releases.fidan.dev/manifest.json`.

            ## Notes

            - The `fidan` binaries published here are self-managed installs.
            - Optional toolchains such as LLVM are distributed separately via `releases.fidan.dev`.
            - By installing Fidan or any separately distributed toolchain component, you agree to the license and terms of the respective component.

  winget:
    name: Submit winget manifest
    runs-on: windows-latest
    needs: publish
    environment: releases
    if: ${{ github.event_name == 'push' && needs.publish.result == 'success' }}

    steps:
      - uses: actions/checkout@v6

      - name: Download merged distribution bundle
        uses: actions/download-artifact@v8
        with:
          name: distribution-bundle
          path: dist/release

      - name: Submit winget manifest
        shell: pwsh
        env:
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $manifestRoot = "config/winget/manifest"
          if (-not (Test-Path -LiteralPath $manifestRoot)) {
            throw "Expected winget manifest root at '$manifestRoot'"
          }

          $installerManifestMatches = Get-ChildItem -Path $manifestRoot -Recurse -File -Filter "Fidan.Fidan.installer.yaml"
          if (-not $installerManifestMatches) {
            throw "No Fidan.Fidan.installer.yaml found under '$manifestRoot'"
          }

          $manifestDirs = @($installerManifestMatches | Select-Object -ExpandProperty DirectoryName -Unique)
          if ($manifestDirs.Count -eq 1) {
            $manifestRoot = $manifestDirs | Select-Object -First 1
          } else {
            $versionMatch = @($manifestDirs | Where-Object { (Split-Path -Leaf $_) -eq $version })
            if ($versionMatch.Count -eq 1) {
              $manifestRoot = $versionMatch | Select-Object -First 1
            } else {
              $candidates = $manifestDirs -join ", "
              throw "Multiple winget manifest directories found and none uniquely matched version '$version': $candidates"
            }
          }

          ./scripts/package-release.ps1 -Version $version -OutputRoot "dist/release" -SkipBuild -SubmitWinget -WingetManifestRoot $manifestRoot
